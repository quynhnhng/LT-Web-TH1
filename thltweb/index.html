<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QuynhStore</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="logo">QuynhStore</div>
    <input type="text" placeholder="Tìm kiếm sản phẩm...">
    <div class="cart">🛒</div>
</header>

<!-- MENU -->
<nav class="menu">
    <a href="#">Điện thoại</a>
    <a href="#">Laptop</a>
    <a href="#">Phụ kiện</a>
    <a href="#">Tablet</a>
</nav>

<section class="banner">
    <div class="banner-content">
        <h1>Khuyến mãi lớn 🔥</h1>
    </div>
    
</section>

<section class="products">
    <h2>Sản phẩm nổi bật</h2>

    <div class="product-list">
        <div class="product">
            <img src="https://cdn1.viettelstore.vn/Images/Product/ProductImage/444965480.jpeg">
            <h3>iPhone 17 Pro Max</h3>
            <p class="price">36.490.000đ</p>
            <button>Mua</button>
        </div>

        <div class="product">
            <img src="https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/s/a/samsung-galaxy-s26-ultra-1.jpg">
            <h3>Samsung Galaxy S26 Ultra</h3>
            <p class="price">29.990.000đ</p>
            <button>Mua</button>
        </div>

        <div class="product">
            <img src="https://sonpixel.vn/wp-content/uploads/2025/12/xiaomi-17-ultra.webp">
            <h3>Xiaomi 17 Ultra</h3>
            <p class="price">34.590.000đ</p>
            <button>Mua</button>
        </div>
    </div>
</section>

<footer class="footer">
    <p>© 2026 QuynhStore</p>
</footer>

</body>
</html>
